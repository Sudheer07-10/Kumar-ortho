<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 34px; fill: white; letter-spacing: 2px; }
      .subtitle { font-family: 'Arial', sans-serif; font-size: 14px; fill: white; letter-spacing: 4px; font-weight: bold; }
    </style>
  </defs>

  <!-- Left Icon -->
  <g transform="translate(30, 20)">
    <!-- Swoosh (Teal) -->
    <path d="M50 100 C 5 100, -10 55, 10 20 C 20 0, 45 -5, 55 5 C 55 5, 30 15, 25 45 C 20 75, 45 85, 65 85 C 85 85, 95 70, 95 50 C 95 30, 75 15, 75 15 C 75 15, 105 25, 110 55 C 115 85, 95 110, 65 110 C 60 110, 55 100, 50 100 Z" fill="#078b9b" />
    
    <!-- Person Head (Teal) -->
    <circle cx="60" cy="15" r="10" fill="#078b9b" />
    
    <!-- Person Body & Arms (Dark Blue) -->
    <path d="M35 5 C 45 20, 55 40, 60 55 C 65 40, 75 20, 85 5 L 92 10 C 75 35, 70 70, 75 105 L 60 105 C 50 70, 45 35, 28 10 Z" fill="#243468" />
  </g>

  <!-- Right Text Box -->
  <g transform="translate(160, 40)">
    <!-- Dark Blue Box -->
    <rect x="0" y="0" width="320" height="42" fill="#243468" />
    <text x="160" y="30" class="title" text-anchor="middle">KUMAR HOSPITAL</text>

    <!-- Teal Box -->
    <rect x="0" y="42" width="320" height="24" fill="#078b9b" />
    <text x="160" y="58" class="subtitle" text-anchor="middle">ORTHO &amp; MULTISPECIALITY</text>
  </g>
</svg>
